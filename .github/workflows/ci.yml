name: CI

# Headless validation on every PR and push to main. Downloads Godot 4.6, imports
# the project, and runs the full tools/validate_*.gd suite + the content lint via
# tools/run_checks.sh. This is the safety net for the "content is data" bet: a
# typo'd resource path or a regressed system fails the build instead of silently
# no-op'ing in game.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: Headless validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-4.6-stable-linux-x86_64

      - name: Download Godot 4.6 (headless)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot
          curl -sSL -o /tmp/godot.zip \
            "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d ~/godot
          chmod +x ~/godot/Godot_v4.6-stable_linux.x86_64

      - name: Set GODOT path
        run: echo "GODOT=$HOME/godot/Godot_v4.6-stable_linux.x86_64" >> "$GITHUB_ENV"

      - name: Import project
        run: $GODOT --headless --path . --import

      - name: Run validation suite
        run: bash tools/run_checks.sh
